openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: SplitEase expense splitting API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: groups
  - name: expenses
  - name: settlements
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/reset-password/{token}:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-email/{token}:
    get:
      operationId: verifyEmail
      tags: [auth]
      summary: Verify email address
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Users
  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/change-password:
    put:
      operationId: changePassword
      tags: [users]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Wrong current password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Groups
  /groups:
    get:
      operationId: listGroups
      tags: [groups]
      summary: List user's groups
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupSummary"
    post:
      operationId: createGroup
      tags: [groups]
      summary: Create a group
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupInput"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"

  /groups/{groupId}:
    get:
      operationId: getGroup
      tags: [groups]
      summary: Get group details
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateGroup
      tags: [groups]
      summary: Update a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupUpdate"
      responses:
        "200":
          description: Updated group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Group"
    delete:
      operationId: deleteGroup
      tags: [groups]
      summary: Delete a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /groups/{groupId}/invite:
    post:
      operationId: inviteToGroup
      tags: [groups]
      summary: Invite a user to group by email
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "200":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /groups/invite/accept/{token}:
    get:
      operationId: acceptGroupInvite
      tags: [groups]
      summary: Accept group invitation
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Joined group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /groups/{groupId}/members/{userId}:
    delete:
      operationId: removeMember
      tags: [groups]
      summary: Remove a member from group
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /groups/{groupId}/leave:
    post:
      operationId: leaveGroup
      tags: [groups]
      summary: Leave a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Left group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /groups/{groupId}/balances:
    get:
      operationId: getGroupBalances
      tags: [groups]
      summary: Get group balances
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group balances
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupBalances"

  /groups/{groupId}/activity:
    get:
      operationId: getGroupActivity
      tags: [groups]
      summary: Get group activity feed
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  # Expenses
  /groups/{groupId}/expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses in a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseInput"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /groups/{groupId}/expenses/{expenseId}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense details
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpenseUpdate"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
        - name: expenseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Settlements
  /groups/{groupId}/settlements:
    get:
      operationId: listSettlements
      tags: [settlements]
      summary: List settlements in a group
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Settlements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Settlement"
    post:
      operationId: createSettlement
      tags: [settlements]
      summary: Record a settlement
      security:
        - bearerAuth: []
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementInput"
      responses:
        "201":
          description: Settlement recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settlement"

  # Dashboard
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard overview
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dashboard"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    # Auth schemas
    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordInput:
      type: object
      required: [password]
      properties:
        password:
          type: string
          minLength: 8

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8

    # User schemas
    User:
      type: object
      required: [id, name, email, currency, emailVerified, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        currency:
          type: string
        emailVerified:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        avatarUrl:
          type: ["string", "null"]
        currency:
          type: string

    # Group schemas
    GroupMember:
      type: object
      required: [id, name, email, role, joinedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time

    GroupSummary:
      type: object
      required: [id, name, memberCount, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        memberCount:
          type: integer
        myBalance:
          type: number
        createdAt:
          type: string
          format: date-time

    Group:
      type: object
      required: [id, name, createdBy, members, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        createdBy:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/GroupMember"
        createdAt:
          type: string
          format: date-time

    GroupInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        imageUrl:
          type: string

    GroupUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    InviteInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    # Balance schemas
    Debt:
      type: object
      required: [fromUserId, fromUserName, toUserId, toUserName, amount]
      properties:
        fromUserId:
          type: integer
        fromUserName:
          type: string
        toUserId:
          type: integer
        toUserName:
          type: string
        amount:
          type: number

    MemberBalance:
      type: object
      required: [userId, name, balance]
      properties:
        userId:
          type: integer
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]
        balance:
          type: number

    GroupBalances:
      type: object
      required: [memberBalances, simplifiedDebts]
      properties:
        memberBalances:
          type: array
          items:
            $ref: "#/components/schemas/MemberBalance"
        simplifiedDebts:
          type: array
          items:
            $ref: "#/components/schemas/Debt"

    # Expense schemas
    ExpenseSplit:
      type: object
      required: [userId, userName, amountOwed]
      properties:
        userId:
          type: integer
        userName:
          type: string
        avatarUrl:
          type: ["string", "null"]
        amountOwed:
          type: number
        percentage:
          type: ["number", "null"]

    SplitInput:
      type: object
      required: [userId, amount]
      properties:
        userId:
          type: integer
        amount:
          type: number
        percentage:
          type: ["number", "null"]

    Expense:
      type: object
      required: [id, groupId, title, amount, currency, category, paidBy, paidByName, splitType, splits, createdBy, createdAt]
      properties:
        id:
          type: integer
        groupId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        amount:
          type: number
        currency:
          type: string
        category:
          type: string
        date:
          type: string
          format: date
        paidBy:
          type: integer
        paidByName:
          type: string
        paidByAvatarUrl:
          type: ["string", "null"]
        splitType:
          type: string
          enum: [equal, exact, percentage]
        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplit"
        receiptUrl:
          type: ["string", "null"]
        createdBy:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExpenseInput:
      type: object
      required: [title, amount, currency, category, paidBy, splitType, splits]
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
        amount:
          type: number
          minimum: 0.01
        currency:
          type: string
          default: USD
        category:
          type: string
          enum: [food, transport, accommodation, entertainment, utilities, other]
        date:
          type: string
          format: date
        paidBy:
          type: integer
        splitType:
          type: string
          enum: [equal, exact, percentage]
        splits:
          type: array
          items:
            $ref: "#/components/schemas/SplitInput"
        receiptUrl:
          type: string

    ExpenseUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: ["string", "null"]
        amount:
          type: number
          minimum: 0.01
        currency:
          type: string
        category:
          type: string
          enum: [food, transport, accommodation, entertainment, utilities, other]
        date:
          type: string
          format: date
        paidBy:
          type: integer
        splitType:
          type: string
          enum: [equal, exact, percentage]
        splits:
          type: array
          items:
            $ref: "#/components/schemas/SplitInput"

    # Settlement schemas
    Settlement:
      type: object
      required: [id, groupId, paidBy, paidByName, paidTo, paidToName, amount, createdAt]
      properties:
        id:
          type: integer
        groupId:
          type: integer
        paidBy:
          type: integer
        paidByName:
          type: string
        paidByAvatarUrl:
          type: ["string", "null"]
        paidTo:
          type: integer
        paidToName:
          type: string
        paidToAvatarUrl:
          type: ["string", "null"]
        amount:
          type: number
        note:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SettlementInput:
      type: object
      required: [paidTo, amount]
      properties:
        paidTo:
          type: integer
        amount:
          type: number
          minimum: 0.01
        note:
          type: string

    # Activity
    Activity:
      type: object
      required: [id, groupId, userId, userName, actionType, description, createdAt]
      properties:
        id:
          type: integer
        groupId:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userAvatarUrl:
          type: ["string", "null"]
        actionType:
          type: string
        description:
          type: string
        metadata:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    # Dashboard
    GroupBalance:
      type: object
      required: [groupId, groupName, balance]
      properties:
        groupId:
          type: integer
        groupName:
          type: string
        balance:
          type: number

    Dashboard:
      type: object
      required: [totalBalance, totalOwed, totalOwe, groupBalances, recentActivity]
      properties:
        totalBalance:
          type: number
        totalOwed:
          type: number
        totalOwe:
          type: number
        groupBalances:
          type: array
          items:
            $ref: "#/components/schemas/GroupBalance"
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/Activity"
