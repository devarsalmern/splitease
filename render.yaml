services:
  - type: web
    name: splitease-api
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9 && NODE_ENV=development pnpm install --no-frozen-lockfile && pnpm run typecheck:libs && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push-force
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: splitease-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.resend.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: resend
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: onboarding@resend.dev

    # Exported from Render on 2026-06-07T10:38:52Z

databases:
  - name: splitease-db
    databaseName: splitease_db_3sjt
    user: splitease_db_3sjt_user
    plan: free
    region: oregon
    ipAllowList:
  - source: 0.0.0.0/0
    description: everywhere
  postgresMajorVersion: "18"

